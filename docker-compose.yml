services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5

  # ── Mail Server (Mailpit – dev SMTP + web UI) ───────────────────────────────
  mail:
    image: axllent/mailpit:v1.18
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # ── Node.js API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      target: runner
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST:   mail
      MAIL_PORT:   1025
      MAIL_FROM:   ${MAIL_FROM}
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started

  # ── React UI ────────────────────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      target: runner
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  db_data:
