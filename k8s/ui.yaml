apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: ghcr.io/aminnadaf/ui:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: app
spec:
  type: NodePort
  selector:
    app: ui
  ports:
    - port: 80
      nodePort: 30080
