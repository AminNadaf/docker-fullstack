# Apply with: kubectl apply -f k8s/secret.yaml
# Values are base64 encoded: echo -n 'value' | base64
# appdb     -> YXBwZGI=
# appuser   -> YXBwdXNlcg==
# password  -> cGFzc3dvcmQ=
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: app
type: Opaque
data:
  DB_NAME: YXBwZGI=
  DB_USER: YXBwdXNlcg==
  DB_PASSWORD: cGFzc3dvcmQ=
  MAIL_FROM: bnJlcGx5QGV4YW1wbGUuY29t
