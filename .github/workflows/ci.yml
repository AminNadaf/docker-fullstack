name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: api
      - run: npm test
        working-directory: api

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push UI
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/ui:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/ui:latest

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/api:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/api:latest

      - name: Health check
        env:
          DB_NAME: appdb
          DB_USER: appuser
          DB_PASSWORD: testpassword
          MAIL_FROM: noreply@example.com
        run: |
          docker compose up -d
          sleep 20
          curl -f http://localhost:3000 || exit 1
          curl -f http://localhost:3000/api/health || exit 1
          docker compose down

  trivy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Scan UI image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/ui:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy:
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBECONFIG_DATA" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: Deploy to K8s
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/db.yaml
          kubectl apply -f k8s/api.yaml
          kubectl apply -f k8s/ui.yaml
          kubectl set image deployment/api api=ghcr.io/${{ env.OWNER }}/api:${{ github.sha }} -n app
          kubectl set image deployment/ui  ui=ghcr.io/${{ env.OWNER }}/ui:${{ github.sha }}  -n app
          kubectl rollout status deployment/api -n app --timeout=120s
          kubectl rollout status deployment/ui  -n app --timeout=120s
