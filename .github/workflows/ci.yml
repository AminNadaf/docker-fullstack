name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: api
      - run: npm test
        working-directory: api

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push UI
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/ui:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/ui:latest

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.OWNER }}/api:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/api:latest

      - name: Health check
        env:
          DB_NAME: appdb
          DB_USER: appuser
          DB_PASSWORD: testpassword
          MAIL_FROM: noreply@example.com
        run: |
          docker compose up -d
          sleep 20
          curl -f http://localhost:3000 || exit 1
          curl -f http://localhost:3000/api/health || exit 1
          docker compose down

  trivy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Scan UI image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ env.OWNER }}/ui:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
